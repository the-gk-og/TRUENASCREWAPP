<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - {{ organization.name or 'ShowWise' }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            max-width: 400px;
            width: 100%;
            margin: 0 20px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .content {
            padding: 40px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #333;
        }
        
        input, textarea {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .submit-btn:active {
            transform: translateY(0);
        }
        
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .message.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }
        
        .hint {
            font-size: 13px;
            color: #999;
            margin-top: 8px;
        }
        
        .loading {
            display: none;
            text-align: center;
            color: #667eea;
        }
        
        .loading::after {
            content: '';
            animation: spinner 1s linear infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>🔐 Password Reset</h1>
                <p>{{ organization.name or 'ShowWise' }} Crew Management</p>
            </div>
            
            <div class="content">
                <div id="message" class="message"></div>
                
                <form id="forgotForm">
                    <div class="form-group">
                        <label for="username_or_email">Username or Email Address</label>
                        <input 
                            type="text" 
                            id="username_or_email" 
                            name="username_or_email" 
                            placeholder="Enter your username or email"
                            required
                        >
                        <div class="hint">Enter the username or email address associated with your account</div>
                    </div>
                    
                    <button type="submit" class="submit-btn" id="submitBtn">Send Reset Link</button>
                </form>
                
                <div class="loading" id="loading">Sending...</div>
                
                <div class="back-link">
                    <a href="{{ url_for('auth.login') }}">← Back to Login</a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('forgotForm');
        const messageEl = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const loadingEl = document.getElementById('loading');
        
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const usernameOrEmail = document.getElementById('username_or_email').value;
            
            if (!usernameOrEmail) {
                showMessage('Please enter your username or email', 'error');
                return;
            }
            
            submitBtn.style.display = 'none';
            loadingEl.style.display = 'block';
            
            try {
                const response = await fetch('/password/forgot', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username_or_email: usernameOrEmail
                    })
                });
                
                const data = await response.json();
                
                if (response.ok || response.status === 200) {
                    showMessage(data.message || 'If an account exists with that username/email, a reset link has been sent.', 'success');
                    form.reset();
                    // Optionally redirect after delay
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 3000);
                } else {
                    showMessage(data.error || 'An error occurred', 'error');
                }
            } catch (err) {
                showMessage('Network error. Please try again.', 'error');
                console.error(err);
            } finally {
                submitBtn.style.display = 'block';
                loadingEl.style.display = 'none';
            }
        });
        
        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = 'message ' + type;
        }
    </script>
</body>
</html>
