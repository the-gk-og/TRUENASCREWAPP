<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Changed</title>
</head>
<body style="margin:0;padding:0;background:#f3f4f6;font-family:'Segoe UI',Arial,sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f3f4f6;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0"
               style="max-width:600px;width:100%;background:#ffffff;border-radius:16px;
                      overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);">

          <!-- Header -->
          <tr>
            <td style="background:linear-gradient(135deg,#059669 0%,#10b981 100%);
                       padding:40px 48px 36px;text-align:center;">
              <p style="margin:0 0 8px;font-size:12px;letter-spacing:3px;text-transform:uppercase;
                         color:rgba(255,255,255,0.7);font-weight:600;">ShowWise</p>
              <h1 style="margin:0;font-size:28px;font-weight:800;color:#ffffff;">
                ✅ Password Changed
              </h1>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:40px 48px 32px;">

              <p style="margin:0 0 20px;font-size:16px;color:#374151;line-height:1.6;">
                Hi <strong>{{ username }}</strong>,
              </p>
              <p style="margin:0 0 24px;font-size:15px;color:#4b5563;line-height:1.75;">
                Your ShowWise password has been successfully changed.
              </p>

              <!-- Info row -->
              <table width="100%" cellpadding="0" cellspacing="0"
                     style="background:#f0fdf4;border:1px solid #86efac;border-radius:10px;margin:0 0 24px;">
                <tr>
                  <td style="padding:16px 20px;">
                    <p style="margin:0;font-size:13px;color:#166534;line-height:1.5;">
                      🕐 Changed at: <strong>{{ changed_at }}</strong>
                    </p>
                  </td>
                </tr>
              </table>

              <!-- Security alert -->
              <table width="100%" cellpadding="0" cellspacing="0"
                     style="background:#fef2f2;border:1px solid #fca5a5;border-radius:10px;margin:0 0 24px;">
                <tr>
                  <td style="padding:16px 20px;">
                    <p style="margin:0;font-size:13px;color:#b91c1c;line-height:1.5;">
                      🚨 <strong>Not you?</strong> Contact your administrator immediately if you did not make this change.
                    </p>
                  </td>
                </tr>
              </table>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#f9fafb;border-top:1px solid #f0f0f0;padding:22px 48px;text-align:center;">
              <p style="margin:0;font-size:12px;color:#d1d5db;">
                &copy; {{ org_name }} &middot; Powered by ShowWise
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
