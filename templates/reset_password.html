<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ── PRIMARY META ── -->
    <title>Reset Password - {{ organization.name or 'ShowWise' }}</title>
    <meta name="description" content="Create a new password for your ShowWise account.">
    <meta name="author"      content="ShowWise">
    <meta name="robots"      content="noindex, nofollow">
    <!-- ── OPEN GRAPH ── -->
    <meta property="og:type"        content="website">
    <meta property="og:site_name"   content="ShowWise">
    <meta property="og:title"       content="Reset Password - ShowWise">
    <meta property="og:description" content="Create a new password for your ShowWise account.">
    <meta property="og:image"       content="https://showwise.app/static/og-image.png">
    <meta property="og:locale"      content="en_AU">
    <!-- ── TWITTER CARD ── -->
    <meta name="twitter:card"        content="summary_large_image">
    <meta name="twitter:site"        content="@showwiseapp">
    <meta name="twitter:title"       content="Reset Password - ShowWise">
    <meta name="twitter:description" content="Create a new password for your ShowWise account.">
    <meta name="twitter:image"       content="https://showwise.app/static/og-image.png">
    <!-- ── FAVICON / THEME ── -->
  <link rel="icon" type="image/png" href="/static/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon/favicon.svg" />
  <link rel="shortcut icon" href="/static/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/static/favicon/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="ShowWise" />
  <link rel="manifest" href="/static/favicon/site.webmanifest" />
  <meta name="theme-color" content="#1c252a">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary:   {{ organization.primary_color or '#6366f1' }};
            --secondary: {{ organization.secondary_color or '#898989' }};
            --dark:    #1f2937;
            --success: #10b981;
            --danger:  #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .bg-circle {
            position: fixed;
            width: 400px; height: 400px;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
            animation: float 20s infinite;
            pointer-events: none;
            z-index: 0;
        }
        .bg-circle-1 { top: -80px; left: -60px; }
        .bg-circle-2 { bottom: -100px; right: -60px; animation-delay: 3s; }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(20px)} }

        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 10;
            animation: slideUp 0.4s ease;
        }
        @keyframes slideUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

        .header {
            text-align: center;
            margin-bottom: 1.75rem;
        }
        .header img {
            max-height: 80px;
            margin-bottom: 1.25rem;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        .header h1 { font-size: 1.6rem; color: var(--primary); margin-bottom: 0.25rem; }
        .header p  { color: #6b7280; font-size: 0.9rem; }

        label {
            display: block;
            margin-bottom: 0.35rem;
            font-weight: 600;
            color: #374151;
            font-size: 0.88rem;
        }

        .form-group { margin-bottom: 1.1rem; }

        input[type="password"] {
            width: 100%;
            padding: 0.7rem 0.9rem;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
        }

        .pw-strength {
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            margin-top: 0.35rem;
            overflow: hidden;
        }
        .pw-strength-bar { height: 100%; width: 0; transition: all 0.3s; }

        .input-hint {
            font-size: 0.78rem;
            margin-top: 0.3rem;
            color: #6b7280;
        }
        .input-hint.success { color: var(--success); }
        .input-hint.error   { color: var(--danger); }

        .requirements {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 0.875rem 1rem;
            margin-bottom: 1.25rem;
        }
        .req-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.82rem;
            color: #9ca3af;
            margin-bottom: 0.35rem;
            transition: color 0.2s;
        }
        .req-item:last-child { margin-bottom: 0; }
        .req-item i { width: 14px; text-align: center; }
        .req-item.met   { color: var(--success); }
        .req-item.unmet { color: #9ca3af; }

        .alert {
            padding: 0.8rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.1rem;
            display: flex;
            align-items: flex-start;
            gap: 0.6rem;
            font-size: 0.88rem;
        }
        .alert-error   { background: #fef2f2; color: #7f1d1d; border-left: 4px solid var(--danger); }
        .alert-success { background: #f0fdf4; color: #166534; border-left: 4px solid var(--success); }

        .btn {
            width: 100%;
            padding: 0.875rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            text-decoration: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(99,102,241,0.3);
        }
        .btn-primary:hover    { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(99,102,241,0.4); }
        .btn-primary:active   { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.7; transform: none; cursor: not-allowed; }

        .footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.25rem;
            border-top: 1px solid #e5e7eb;
        }
        .footer-links {
            display: flex;
            gap: 1.25rem;
            justify-content: center;
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
        }
        .footer-links a {
            color: #6b7280;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }
        .footer-links a:hover { color: var(--primary); }
        .powered-by { color: #9ca3af; font-size: 0.75rem; margin-top: 0.5rem; }

        @media (max-width: 480px) {
            body { padding: 1rem 0.75rem; align-items: flex-start; }
            .container { padding: 1.75rem 1.5rem; }
            .header h1 { font-size: 1.35rem; }
        }
    </style>
</head>
<body>
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>

    <div class="container">
        <div class="header">
            {% if organization.logo %}
            <img src="{{ organization.logo }}" alt="{{ organization.name }}">
            {% endif %}
            <h1><i class="fas fa-key"></i> Create New Password</h1>
            <p>{{ organization.name }} &mdash; ShowWise</p>
        </div>

        <div id="alertBox" class="alert" style="display:none;"></div>

        <form id="resetForm">
            <div class="form-group">
                <label for="new_password"><i class="fas fa-lock"></i> New Password</label>
                <input type="password" id="new_password" name="new_password"
                       placeholder="Min 6 characters" autocomplete="new-password" required>
                <div class="pw-strength"><div class="pw-strength-bar" id="pwBar"></div></div>
                <div class="input-hint" id="pwStrengthLabel"></div>
            </div>

            <div class="form-group">
                <label for="confirm_password"><i class="fas fa-check-double"></i> Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password"
                       placeholder="Re-enter your new password" autocomplete="new-password" required>
                <div class="input-hint" id="pwMatchHint"></div>
            </div>

            <div class="requirements">
                <div class="req-item unmet" id="req-length">
                    <i class="fas fa-circle-dot"></i> At least 6 characters
                </div>
                <div class="req-item unmet" id="req-match">
                    <i class="fas fa-circle-dot"></i> Passwords match
                </div>
            </div>

            <button type="submit" class="btn btn-primary" id="submitBtn">
                <i class="fas fa-check"></i> Reset Password
            </button>
        </form>

        <div class="footer">
            <div class="footer-links">
                <a href="{{ url_for('auth.login') }}"><i class="fas fa-arrow-left"></i> Back to Login</a>
                <a href="https://showwise.app/contact" target="_blank"><i class="fas fa-envelope"></i> Contact</a>
            </div>
            <div class="powered-by">Powered by <strong>ShowWise</strong></div>
        </div>
    </div>

    <script>
        const newPwInput  = document.getElementById('new_password');
        const confPwInput = document.getElementById('confirm_password');
        const alertBox    = document.getElementById('alertBox');
        const submitBtn   = document.getElementById('submitBtn');

        newPwInput.addEventListener('input', updateUI);
        confPwInput.addEventListener('input', updateUI);

        function updateUI() {
            const pw   = newPwInput.value;
            const conf = confPwInput.value;

            let s = 0;
            if (pw.length >= 6)  s += 25;
            if (pw.length >= 10) s += 25;
            if (/[a-z]/.test(pw) && /[A-Z]/.test(pw)) s += 25;
            if (/[0-9]/.test(pw)) s += 15;
            if (/[^a-zA-Z0-9]/.test(pw)) s += 10;

            const colors = ['#ef4444', '#f59e0b', '#10b981', '#059669'];
            const labels = ['Weak', 'Fair', 'Good', 'Strong'];
            const i = s < 25 ? 0 : s < 50 ? 1 : s < 75 ? 2 : 3;

            const bar   = document.getElementById('pwBar');
            const label = document.getElementById('pwStrengthLabel');
            bar.style.width      = Math.min(s, 100) + '%';
            bar.style.background = colors[i];
            label.textContent    = pw.length ? labels[i] + ' password' : '';
            label.style.color    = colors[i];

            const lenOk   = pw.length >= 6;
            const matchOk = pw && conf && pw === conf;

            setReq('req-length', lenOk);
            setReq('req-match',  matchOk);

            const matchHint = document.getElementById('pwMatchHint');
            if (!conf) {
                matchHint.textContent = '';
            } else {
                matchHint.textContent  = matchOk ? '✓ Passwords match' : '✗ Passwords do not match';
                matchHint.className    = 'input-hint ' + (matchOk ? 'success' : 'error');
            }
        }

        function setReq(id, met) {
            const el = document.getElementById(id);
            el.classList.toggle('met',   met);
            el.classList.toggle('unmet', !met);
            el.querySelector('i').className = met ? 'fas fa-check-circle' : 'fas fa-circle-dot';
        }

        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const pw   = newPwInput.value;
            const conf = confPwInput.value;

            if (pw.length < 6)  { showAlert('Password must be at least 6 characters.', 'error'); return; }
            if (pw !== conf)     { showAlert('Passwords do not match.', 'error'); return; }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting...';

            try {
                const res  = await fetch('/password/reset/{{ token }}', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ new_password: pw, confirm_password: conf })
                });
                const data = await res.json();

                if (res.ok) {
                    showAlert('Password reset successfully! Redirecting to login…', 'success');
                    setTimeout(() => { window.location.href = '/login'; }, 2000);
                } else {
                    showAlert(data.error || 'An error occurred.', 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-check"></i> Reset Password';
                }
            } catch {
                showAlert('Network error. Please try again.', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-check"></i> Reset Password';
            }
        });

        function showAlert(msg, type) {
            alertBox.className = `alert alert-${type}`;
            alertBox.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${msg}`;
            alertBox.style.display = 'flex';
            alertBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    </script>
</body>
</html>
